name: Deploy Capture Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-capture-worker.yml"
      - "workers/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          wranglerVersion: "4.97.0"
          secrets: |
            UPLOAD_TOKEN
            GITHUB_TOKEN
        env:
          UPLOAD_TOKEN: ${{ secrets.CAPTURE_UPLOAD_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.CAPTURE_GITHUB_TOKEN }}
